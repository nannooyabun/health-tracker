name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install and build
        run: |
          cat package.json
          cat vite.config.js
          rm -rf node_modules dist
          npm install --legacy-peer-deps
          echo "--- node_modules check ---"
          ls node_modules/react/package.json && echo "react OK" || echo "react MISSING"
          ls node_modules/react-dom/package.json && echo "react-dom OK" || echo "react-dom MISSING"
          ls node_modules/recharts/package.json && echo "recharts OK" || echo "recharts MISSING"
          echo "--- building ---"
          npx vite build
          echo "--- dist output ---"
          ls -la dist/assets/
          wc -c dist/assets/*.js

      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - id: deployment
        uses: actions/deploy-pages@v4
